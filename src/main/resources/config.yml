# Skins couteau (arme COUTEAU_COMBAT) : cles = id CosmeticProfile ; 0 = garder le modele de base
cosmetics:
  knife-skins:
    knife_karambit: 5059
    knife_butterfly: 5060
    knife_m9_bayonet: 5061
    knife_flip: 5062
  # Skins Thompson (cles = id CosmeticProfile WEAPON_SKIN, overrides carrot_on_a_stick.json)
  weapon-skins:
    thompson_skin_1: 5071
    thompson_skin_2: 5072
    thompson_skin_3: 5073
    thompson_skin_4: 5074
    thompson_skin_5: 5075
    thompson_skin_6: 5076
    thompson_skin_7: 5077
    thompson_skin_8: 5078
    thompson_skin_9: 5079
    thompson_skin_10: 5080
    thompson_skin_11: 5081
    thompson_skin_12: 5082

# Ancien bloc bandage (toujours lu pour compat : soins « moyen » par défaut)
bandage:
  heal-half-hearts: 6
  custom-model-data: 3001
  cooldown-seconds: 5

# Bandages (petit / moyen / grand), medikit, potions de bouclier (absorption)
consumables:
  heal-cooldown-seconds: 5
  shield-cooldown-seconds: 8
  bandage-small:
    heal-half-hearts: 2
    custom-model-data: 3002
  bandage-medium:
    heal-half-hearts: 6
    custom-model-data: 3001
  bandage-large:
    heal-half-hearts: 10
    custom-model-data: 3003
  medikit:
    heal-half-hearts: 16
    custom-model-data: 3004
  shield-potion-small:
    absorption-amplifier: 0
    duration-seconds: 45
    custom-model-data: 3011
  shield-potion-medium:
    absorption-amplifier: 1
    duration-seconds: 75
    custom-model-data: 3012
  shield-potion-large:
    absorption-amplifier: 2
    duration-seconds: 120
    custom-model-data: 3013

# Station de soin FPS : bloc ancre + /dpmr medkit create (fichier medkit-stations.yml)
medkit-station:
  enabled: true
  anchor-material: RED_GLAZED_TERRACOTTA
  pickup-radius: 1.12
  cooldown-seconds: 22
  heal-half-hearts: 8
  display-height: 0.82
  display-scale: 0.5
  spin-speed: 0.12

# Zones de capture monnaie : /dpmr capturezone create <id> [rayon] (fichier capture-money-zones.yml)
capture-money-zones:
  enabled: true
  tick-interval-ticks: 20
  points-per-tick: 1
  default-radius: 5
  hologram-y-offset: 2.6

radar:
  custom-model-data: 4001
  scan-radius: 90

# Lunettes de scan (longue-vue DPMR) : clic droit, glow violet pour le porteur (contour via scoreboard)
# scan-radius <= 0 : tous les joueurs du même monde ; sinon distance max en blocs (min 8 si > 0)
wall-vision-goggles:
  custom-model-data: 4002
  scan-radius: 0
  effect-ticks: 300
  cooldown-seconds: 20

# Lunettes infrarouges : même principe que le scan, contour rouge (scoreboard Team.RED)
# scan-radius <= 0 : tous les joueurs du même monde
infrared-goggles:
  custom-model-data: 4003
  scan-radius: 0
  effect-ticks: 300
  cooldown-seconds: 20

# Launchpads (blocs slime DPMR) — plafond de vitesse pour eviter kick vanilla
launchpads:
  max-velocity: 3.8
  # Style PARACHUTE : impulsion plus forte (avant)
  parachute-max-velocity: 4.35
  # Duree des particules "voile" (ticks) apres utilisation du style PARACHUTE
  parachute-fx-duration-ticks: 220
  # Sneak pendant le parachute: descente acceleree (vitesse Y negative)
  parachute-sneak-dive-y: -0.62
  endportal:
    enabled: false
    # Jusqu'a 10 destinations (format: world;x;y;z;yaw;pitch), choisies aleatoirement.
    targets: []
    target:
      world: "world"
      x: 0.0
      y: 80.0
      z: 0.0
      yaw: 0.0
      pitch: 0.0
  teleporter-block:
    enabled: true
    material: "AMETHYST_BLOCK"

loot:
  airdrop:
    # Si true, l'airdrop spawn sur la position fixe ci-dessous (sinon: proche d'un joueur aléatoire).
    fixed-enabled: false
    fixed-location:
      world: "world"
      x: 0
      y: 80
      z: 0
    # Hauteur de spawn au-dessus de la cible
    spawn-height: 28
    # Vitesse de descente (blocs/tick) - plus petit = plus lent
    fall-speed: 0.06
    # Temps d'ouverture (secondes)
    open-seconds: 5
    # Loot: nb d'armes tirées dans les pools
    rolls-min: 2
    rolls-max: 3
    # % de chance (0..1) qu'un roll prenne une arme legendaire (sinon épique)
    legendary-chance: 0.55
    # Contenu du largage de type « Medical » (bandages, medikit, potions bouclier, lance-soin…)
    medical:
      bandage-stacks-min: 3
      bandage-stacks-max: 5
      bandages-per-stack-min: 2
      bandages-per-stack-max: 6
      shield-potion-stacks-min: 1
      shield-potion-stacks-max: 2
      shield-potion-per-stack-min: 1
      shield-potion-per-stack-max: 2
      medikit-stacks-min: 1
      medikit-stacks-max: 2
      medikit-per-stack-min: 1
      medikit-per-stack-max: 2
      include-lance-soin: true
      include-serum-soin: true
  # Coffre suspendu a des ballons (BlockDisplay) : spawn rare pendant le mode apocalypse (meme boucle que loot).
  balloon-chest:
    enabled: true
    # Toutes les X secondes on tente un spawn (si chance OK et max-active non atteint).
    check-interval-seconds: 420
    # Probabilite a chaque check (0..1) — rester bas pour du "rare".
    spawn-chance-per-check: 0.16
    max-active: 3
    height-above-ground: 24
    # Tier de coffre pour le tirage loot (TIER_1, TIER_2, TIER_3, …)
    loot-tier: TIER_2
    # Si true : seuls les projectiles d'armes DPMR (balles tagguees) detruisent le coffre.
    dpmr-projectiles-only: true
    # Message a tous les joueurs quand un coffre ballon apparait (optionnel).
    broadcast-on-spawn: false
  configured-chest-respawn-seconds: 120
  # Poids des raretés (chemins internes / fallback) — GHOST optionnel, tres rare
  rarity-weights:
    COMMON: 72
    UNCOMMON: 18
    RARE: 7
    EPIC: 2
    LEGENDARY: 1
    MYTHIC: 1
    GHOST: 0
  configured-chest-rarity-weights:
    COMMON: 55
    UNCOMMON: 27
    RARE: 13
    EPIC: 5
  # Coffres zone aléatoire : poids des 3 styles (bois / piégé / ender)
  zone-chest-tier-weights:
    tier-1: 50
    tier-2: 35
    tier-3: 15
  # Objets par ouverture (chaque objet = un tirage armure/arme/conso + rarete). Sans GUI.
  # Poids decroissants du plus commun au plus rare (GHOST = le plus rare, souvent 0 sur coffres bois)
  chest-tier:
    tier-1:
      loot-rolls: 1
      category-weapon-weight: 45
      category-armor-weight: 30
      category-consumable-weight: 25
      rarity-weights:
        COMMON: 100
        UNCOMMON: 28
        RARE: 10
        EPIC: 4
        LEGENDARY: 2
        MYTHIC: 0
        GHOST: 0
    tier-2:
      loot-rolls: 2
      category-weapon-weight: 50
      category-armor-weight: 25
      category-consumable-weight: 25
      rarity-weights:
        COMMON: 55
        UNCOMMON: 28
        RARE: 12
        EPIC: 4
        LEGENDARY: 2
        MYTHIC: 1
        GHOST: 0
    tier-3:
      loot-rolls: 3
      category-weapon-weight: 55
      category-armor-weight: 20
      category-consumable-weight: 25
      rarity-weights:
        COMMON: 30
        UNCOMMON: 25
        RARE: 20
        EPIC: 12
        LEGENDARY: 8
        MYTHIC: 4
        GHOST: 1
    # Maritime Chest (barrel): place in water only; 1 roll, rarity between tier I and II
    maritime:
      loot-rolls: 1
      category-weapon-weight: 48
      category-armor-weight: 27
      category-consumable-weight: 25
      rarity-weights:
        COMMON: 72
        UNCOMMON: 26
        RARE: 12
        EPIC: 7
        LEGENDARY: 3
        MYTHIC: 0
        GHOST: 0
    # Maritime II (smoker, eau) : 2 rolls
    maritime-2:
      loot-rolls: 2
      category-weapon-weight: 50
      category-armor-weight: 25
      category-consumable-weight: 25
      rarity-weights:
        COMMON: 55
        UNCOMMON: 28
        RARE: 14
        EPIC: 8
        LEGENDARY: 4
        MYTHIC: 1
        GHOST: 0
    # Maritime III (haut fourneau, eau) : 3 rolls
    maritime-3:
      loot-rolls: 3
      category-weapon-weight: 52
      category-armor-weight: 23
      category-consumable-weight: 25
      rarity-weights:
        COMMON: 38
        UNCOMMON: 26
        RARE: 18
        EPIC: 12
        LEGENDARY: 6
        MYTHIC: 2
        GHOST: 0
  # Coffre loot: au plus 1 arme DPMR (0 = parfois pas d'arme, 1 = toujours une arme si le pool le permet)
  chest-weapon-min: 0
  chest-weapon-max: 1
  # Pièces d'armure DPMR (profil + slot aléatoires)
  chest-armor-min: 0
  chest-armor-max: 1
  # Ancien nom (armes uniquement) — ignoré si chest-weapon-min/max sont définis ; sinon plafonné à 1 arme
  chest-rolls-min: 0
  chest-rolls-max: 1
  bandage-stacks-min: 2
  bandage-stacks-max: 5
  bandages-per-stack-min: 1
  bandages-per-stack-max: 3
  # Poids pour les stacks « soins » (bandages + medikit) dans les coffres
  bandage-type-weights:
    bandage-small: 28
    bandage-medium: 40
    bandage-large: 22
    medikit: 10
  shield-potion-stacks-min: 0
  shield-potion-stacks-max: 1
  shield-potion-per-stack-min: 1
  shield-potion-per-stack-max: 1
  shield-potion-type-weights:
    shield-potion-small: 50
    shield-potion-medium: 35
    shield-potion-large: 15
  # Armes DPMR pour les coffres : au demarrage le plugin fusionne avec tout le catalogue (WeaponProfile).
  # Les chances par rarete sont dans chest-tier.*.rarity-weights (plus c'est haut, plus c'est rare).
  chest-weapons: []
  # Pool admin (menu config) : legendaries + mythiques + ghost — complete au demarrage
  legendary-weapons: []
  airdrop-interval-seconds: 300
  chest-spawn-interval-seconds: 180
  chest-spawn-max-active: 5
  chest-spawn-zone:
    enabled: false
    world: "world"
    corner-a:
      x: 0
      y: 60
      z: 0
    corner-b:
      x: 32
      y: 80
      z: 32

boosts:
  spawn-interval-seconds: 120
  available:
    - "INVINCIBILITY"
    - "RAPID_FIRE"
    - "SPEED"

zones:
  # Plusieurs safe / war : remplir "regions" (liste de spheres / cuboids / polygons). /dpmr zone <safe|war> set... ajoute une entrée.
  # Tant que "regions" est vide, le bloc world/x/y/z (ou min/max, points) ci-dessous sert de zone unique (compat ancienne config).
  safe:
    enabled: false
    regions: []
    world: "world"
    x: 0
    y: 80
    z: 0
    radius: 18
  # Si enabled=true: les armes/familiers ne marchent que DANS la war zone (et jamais dans safe).
  war:
    enabled: false
    regions: []
    world: "world"
    x: 0
    y: 80
    z: 0
    radius: 120

# Vagues PNJ sur blocs spawner enregistrés (/dpmr npcspawner) — valeurs basses = peu de PNJ, pas de pic au reload
npc-spawners:
  # Delai entre deux verifications par spawner (ticks). 120 = 6 s
  auto-check-period-ticks: 120
  # Premier passage apres demarrage / reload (evite rafale au 1er tick)
  first-check-delay-ticks: 220
  # Entre deux vagues reussies pour un meme spawner (ms)
  auto-spawn-interval-ms: 120000
  # Au chargement : chaque spawner attend entre ~12 s et cette valeur avant sa 1re vague
  startup-stagger-max-ms: 180000
  wave-min: 1
  wave-max: 1
  combat-tick-period: 3
  silent-npcs: false

# PNJ aléatoires zone war + événement hélicoptère (nécessite zones.war.enabled=true sauf fallback ci-dessous)
npc-war-world:
  ambient:
    enabled: true
    # Un seul PNJ au plus par cycle ; chance appliquée à chaque tick de timer
    interval-ticks: 7200
    attempt-chance: 0.12
    max-active: 3
    require-war-zone: true
    surface-attempts: 52
    kind: "MILITARY"
    reward-points: 4
    gold-min: 1
    gold-max: 3
    despawn-ticks: 5200
    # Si require-war-zone: false (war désactivée) : spawn autour du spawn du monde, hors safe
    fallback-world: "world"
    fallback-spread: 80
  # Sentinelles rares en zone war : pistolets (kind PATROL), dégâts réduits, Points à l'élimination
  rare-shooter:
    enabled: true
    interval-ticks: 10800
    attempt-chance: 0.07
    max-active: 2
    require-war-zone: true
    surface-attempts: 52
    kind: "PATROL"
    reward-points: 5
    gold-min: 1
    gold-max: 2
    despawn-ticks: 4800
    shot-damage-scale: 0.52
    fallback-world: "world"
    fallback-spread: 80
  helicopter:
    enabled: true
    interval-seconds: 1800
    require-war-zone: true
    surface-attempts: 72
    soldiers-min: 2
    soldiers-max: 4
    spawn-radius: 5.8
    reward-points: 6
    gold-min: 2
    gold-max: 5
    despawn-ticks: 7200
    broadcast: true
    chest-offset-x: 1
    chest-offset-z: 1
    fallback-world: "world"
    fallback-spread: 110
    chest:
      legendary-chance-per-weapon: 0.38
      weapon-rolls-min: 2
      weapon-rolls-max: 4
      armor-pieces-min: 1
      armor-pieces-max: 2
      bandage-stacks-min: 3
      bandage-stacks-max: 6
      bandages-per-stack-min: 2
      bandages-per-stack-max: 5
      shield-potion-stacks-min: 1
      shield-potion-stacks-max: 2
      shield-potion-per-stack-min: 1
      shield-potion-per-stack-max: 2

resource-pack:
  enabled: true
  # bundled / local = HTTP sur le VPS | external = url + sha1 ici | manifest = JSON GitHub (HTTPS)
  # IMPORTANT : pour GitHub, mets source: manifest ET remplis manifest.url (sinon manifest.url est ignore si source=bundled)
  source: bundled
  # Exemple GitHub StudioEchelon/DPMRPack (branche main) — a copier sur le serveur si tu utilises manifest :
  # source: manifest
  # manifest:
  #   url: "https://raw.githubusercontent.com/StudioEchelon/DPMRPack/main/hosted/dpmr-pack-manifest.json"
  #   refresh-seconds: 900
  manifest:
    url: ""
    # 0 = seulement au demarrage et /dpmr warworld reload ; >0 = re-telecharge le manifest toutes les N secondes
    refresh-seconds: 900
  # --- Mode bundled / local : mini serveur HTTP dans le plugin (ouvre le port sur le pare-feu) ---
  local:
    # Chemin ou le zip est ecrit (bundled = extrait du jar a chaque demarrage)
    file: "resource-pack/dpmr-pack.zip"
    http-port: 8163
    http-path: "/dpmr-pack.zip"
    bind-address: "0.0.0.0"
    # IP ou domaine PUBLIC du serveur (sans http://). Si rempli et public-url vide → URL = http://HOST:PORT + http-path
    public-host: ""
    # Laisse vide pour utiliser public-host + port + chemin ; sinon prioritaire
    public-url: ""
  # --- Mode external (et secours si le manifest echoue) ---
  # URL directe vers le .zip du pack (doit renvoyer le fichier brut, pas une page HTML)
  url: ""
  # SHA1 hex (40 car.) du fichier .zip — OBLIGATOIRE pour que les nouvelles textures s’appliquent :
  #   macOS/Linux: shasum -a 1 dist/dpmr-pack.zip   ou   openssl dgst -sha1 -hex dist/dpmr-pack.zip
  # Sans hash correct, le client garde l’ancien pack ou refuse le téléchargement.
  sha1: ""
  # Incrémente (1, 2, 3…) à chaque nouveau zip SI tu ne peux pas mettre à jour sha1 tout de suite :
  # ajoute ?dpmr_pack_rev=N à l’URL vue par le client pour casser le cache (CDN + client).
  pack-revision: 0
  # Sur /ressourcepack : ajoute dpmr_t=timestamp à l’URL pour forcer un nouveau téléchargement
  cache-bust-on-manual-command: true
  # Si true: kick si refus/échec du pack
  force: true
  # Délai avant kick auto si pack pas chargé (ticks)
  kick-delay-ticks: 900
  # Si true: kick aussi après FAILED_DOWNLOAD (sinon seulement DECLINED ou timeout)
  kick-on-failed-download: false
  # Message affiché au joueur
  prompt: "Pack DPMR requis (armes 3D + sons)."

# Evolving kits — English messages. Playtime = minutes online (see track-interval-seconds).
# Player kit: highest tier with min-minutes <= your total playtime.
# Grade kit: first rank in grade-kit.ranks you have permission for (list is best → worst; use fallback: true for everyone else).
evolving-kits:
  enabled: true
  track-interval-seconds: 60
  player-kit:
    cooldown-hours: 6
    tiers:
      - min-minutes: 0
        label: "Rookie"
        items:
          - type: consumable
            id: bandage-small
            amount: 6
          - type: consumable
            id: shield-potion-small
            amount: 1
          - type: points
            amount: 10
      - min-minutes: 60
        label: "Regular"
        items:
          - type: consumable
            id: bandage-medium
            amount: 8
          - type: consumable
            id: medikit
            amount: 1
          - type: consumable
            id: shield-potion-medium
            amount: 2
          - type: points
            amount: 25
      - min-minutes: 300
        label: "Veteran"
        items:
          - type: consumable
            id: bandage-large
            amount: 8
          - type: consumable
            id: medikit
            amount: 2
          - type: consumable
            id: shield-potion-large
            amount: 2
          - type: weapon
            id: GLOCK18
            amount: 1
          - type: points
            amount: 60
      - min-minutes: 1200
        label: "Committed"
        items:
          - type: consumable
            id: bandage-large
            amount: 12
          - type: consumable
            id: medikit
            amount: 3
          - type: consumable
            id: shield-potion-large
            amount: 3
          - type: weapon
            id: AK47
            amount: 1
          - type: material
            material: GOLDEN_APPLE
            amount: 2
          - type: points
            amount: 120
  grade-kit:
    cooldown-hours: 12
    ranks:
      - permission: dpmr.kit.grade.elite
        label: "Elite"
        items:
          - type: consumable
            id: medikit
            amount: 4
          - type: consumable
            id: shield-potion-large
            amount: 4
          - type: weapon
            id: CARABINE_MK18
            amount: 1
          - type: points
            amount: 150
      - permission: dpmr.kit.grade.vip
        label: "VIP"
        items:
          - type: consumable
            id: medikit
            amount: 2
          - type: consumable
            id: shield-potion-medium
            amount: 3
          - type: weapon
            id: NOVA
            amount: 1
          - type: points
            amount: 75
      - fallback: true
        label: "Member"
        items:
          - type: consumable
            id: bandage-medium
            amount: 6
          - type: consumable
            id: shield-potion-small
            amount: 2
          - type: points
            amount: 30

safe-respawn:
  enabled: true
  respawn-health: 20.0
  spawn:
    world: "world"
    x: 0
    y: 80
    z: 0
    yaw: 0
    pitch: 0
