# Tables d'armement : lodestones enregistrees avec /dpmr modtable set
mod-tables:
  locations: []

points:
  per-player-kill: 10

# Prime PvP : un joueur en ligne est designe au hasard ; le tuer donne des points bonus (hors membres du meme clan).
bounty:
  enabled: true
  interval-minutes: 15
  # Première prime après démarrage du serveur
  first-delay-seconds: 5
  reward-points: 50
  min-players-online: 1

# Periodic clear-lag: removes ground items, experience orbs, end crystals, stray projectiles (not fishing hooks),
# armor stands / item displays without DPMR tags, optional villagers. Chat message is English.
clear-lag:
  enabled: true
  interval-minutes: 10
  message: "Clear lag: %count% entities were removed (drops, projectiles, crystals, stray stands, etc.)."
  remove-dropped-items: true
  remove-experience-orbs: true
  remove-end-crystals: true
  remove-projectiles: true
  remove-stray-armor-stands: true
  remove-stray-item-displays: true
  remove-villagers: false
  remove-wandering-traders: false

# Shoot these blocks with a DPMR weapon (hitscan or projectile) for a temporary buff. Chat messages are in English.
# Optional hologram orbs (ItemDisplay): /dpmr powerup add <kind> [wall|float] — saved in plugins/DPMR/powerup-markers.yml
bonus-powerup-blocks:
  enabled: true
  displays:
    enabled: true
    # Model scale (1 = full block item size)
    scale: 0.38
    glow: true
    particle-aura: true
    spin-degrees-per-tick: 3.0
    bob-amplitude: 0.06
  rapid-fire:
    material: BLUE_CONCRETE
    duration-seconds: 30
    # Multiplier on shot delay while active (0.2 ≈ 5× faster firing)
    cooldown-multiplier: 0.2
  invulnerability:
    material: GRAY_CONCRETE
    duration-seconds: 10
  kill-coins:
    material: YELLOW_CONCRETE
    duration-seconds: 60
    # Extra multiplier on kill points (stacked with profile economy)
    reward-multiplier: 2.0
  bullet-shield:
    material: PURPLE_CONCRETE
    duration-seconds: 30
  stealth:
    material: CYAN_CONCRETE
    duration-seconds: 20

# Cartes de poker : même effets que bonus-powerup-blocks (clic droit). Couleur = effet ; Valet & Jokers = furtivité.
poker-cards:
  enabled: true
  use-cooldown-seconds: 3
  item-material: PAPER
  custom-model-data: 3100

# Daily (1 reward, /lootbox daily) and Ultimate (5 rewards, right-click item) — English UI
lootbox:
  enabled: true
  daily-cooldown-hours: 24
  # Bukkit material for the Ultimate Loot Box item (admins: /lootbox give ultimate <player>)
  ultimate-material: NETHER_STAR

# Coffre-fort personnel : clic droit sur le bloc = page 1, sneak + clic = page 2 (54 cases par page, 108 au total).
vault:
  enabled: true
  # Type de bloc déclencheur (évite les matériaux trop courants si tu veux un seul emplacement dédié).
  block-material: VAULT
  # Vide = tout le monde ; sinon ex. dpmr.vault.use
  use-permission: dpmr.vault.use

# Three daily quest systems per player (/dailyquest): Combat, Gathering, Challenge — English GUI
daily-quests:
  enabled: true
  # Points per completed track (up to 3 rewards per day)
  reward-points: 50
  # Bonus one-shot when all tracks of the day are claimed (0 = disabled)
  bonus-all-complete: 0
  # Optional: daily-quests.reward-points-by-type.KILL_PLAYERS: 60  (falls back to reward-points)
  slot-count: 3
  # IANA timezone for the calendar day (empty = JVM default)
  timezone: ""
  kill-players:
    min: 5
    max: 12
  kill-mobs:
    min: 20
    max: 45
  catch-fish:
    min: 3
    max: 8
  chop-logs:
    min: 8
    max: 22
  deal-player-damage:
    min: 45
    max: 120

# Conquer Pass — /conquerpass (coffre 54 cases). Changer season-id reinitialise la progression + recles paliers.
conquer-pass:
  enabled: true
  season-id: "1"
  xp-per-tier: 350
  max-tier: 14
  page-size: 7
  xp:
    player-kill: 40
    mob-kill: 4
  premium:
    permission: "dpmr.conquerpass.premium"
    unlock-points: 3000
  tiers:
    "1":
      free-points: 30
      premium-points: 90
    "2":
      free-points: 40
      premium-points: 105
    "3":
      free-points: 50
      premium-points: 120
    "4":
      free-points: 60
      premium-points: 135
    "5":
      free-points: 70
      premium-points: 150
    "6":
      free-points: 80
      premium-points: 170
    "7":
      free-points: 90
      premium-points: 190
    "8":
      free-points: 105
      premium-points: 210
    "9":
      free-points: 120
      premium-points: 235
    "10":
      free-points: 135
      premium-points: 260
    "11":
      free-points: 150
      premium-points: 290
    "12":
      free-points: 170
      premium-points: 320
    "13":
      free-points: 190
      premium-points: 350
    "14":
      free-points: 220
      premium-points: 400

# Objectifs dynamiques (pendant /dpmr start) : rotation automatique, boss bar + ligne scoreboard
objectives:
  enabled: true
  min-gap-seconds: 50
  first-delay-seconds: 75
  types:
    elimination-rush:
      enabled: true
      duration-seconds: 300
      kills-to-win: 2
      winner-points: 22
    mob-cull:
      enabled: true
      duration-seconds: 180
      mobs-needed: 35
      participation-points: 8
    hot-zone:
      enabled: true
      duration-seconds: 240
      radius: 14
      player-seconds-needed: 90
      zone-points: 12

boutique:
  default-price: 40
  # Prix par ID d'arme (optionnel, sinon default-price)
  prices: {}
  # Vente d'armes (depuis coffres, etc.)
  # Prix de vente = max(1, round(prix_achat * sell-multiplier)) sauf override dans sell-prices.
  sell-multiplier: 0.5
  sell-default-price: 20
  # Prix de vente par ID d'arme (optionnel)
  sell-prices: {}

weapons:
  # Jauge + coffre 3 choix (Archero / diep.io) sur les armes rayonnées (voir WeaponProfile.supportsKillPerkMeter).
  kill-perks:
    enabled: true
    meter-player-kill: 28
    meter-mob-kill: 6
  nuclear-charge-ticks: 400
  nuclear-radius: 14.0
  nuclear-damage: 48.0
  # CustomModelData : cle = nom exact WeaponProfile (Java). 0 = pas de modele pack sur l’item.
  # Doit correspondre aux overrides du resource pack (stick, golden_hoe, etc.).
  # Thompson : item vanilla = CARROT_ON_A_STICK ; textures dans pack → minecraft/models/item/carrot_on_a_stick.json
